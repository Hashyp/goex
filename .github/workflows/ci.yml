name: ci

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Vet
        run: go vet ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          install-mode: goinstall

      - name: Start Azurite
        run: |
          docker run -d --name azurite \
            -p 10000:10000 \
            mcr.microsoft.com/azure-storage/azurite:3.33.0 \
            azurite-blob --blobHost 0.0.0.0 --skipApiVersionCheck

      - name: Start MinIO
        run: |
          docker run -d --name minio \
            -p 9000:9000 \
            -p 9001:9001 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio server /data --console-address :9001

      - name: Wait For Azurite
        run: |
          for i in {1..30}; do
            (echo > /dev/tcp/127.0.0.1/10000) >/dev/null 2>&1 && exit 0
            sleep 1
          done
          echo "Azurite did not start in time"
          exit 1

      - name: Wait For MinIO
        run: |
          for i in {1..30}; do
            curl -fsS http://127.0.0.1:9000/minio/health/live >/dev/null 2>&1 && exit 0
            sleep 1
          done
          echo "MinIO did not start in time"
          docker logs minio || true
          exit 1

      - name: Test
        env:
          GOEX_RUN_AZURITE_TESTS: "1"
          GOEX_RUN_MINIO_TESTS: "1"
        run: go test ./...
